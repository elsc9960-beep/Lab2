<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація - CalcMaster Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-dark: #1a1c20; --accent-color: #0d6efd; }
        body { background-color: #e9ecef; }
        .navbar-custom, .footer-custom { background-color: var(--primary-dark) !important; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .auth-card { border-radius: 20px; border: none; }
        .btn-login { background-color: transparent; border: 2px solid var(--accent-color); color: var(--accent-color); font-weight: bold; }
        .btn-login:hover { background-color: var(--accent-color); color: white; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <header class="navbar navbar-expand-lg navbar-dark navbar-custom p-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">CalcMaster<span class="text-primary">.PRO</span></a>
            <div class="navbar-nav ms-auto align-items-center">
                <a href="index.html" class="nav-link">Калькулятор</a>
                <a href="about.html" class="nav-link mx-2">Про додаток</a>
                <a href="profile.html" class="nav-link mx-2">Профіль</a>
                <a href="login.html" class="btn btn-login ms-3 px-4">Увійти</a>
            </div>
        </div>
    </header>

    <main class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card auth-card shadow-lg p-4">
                    <h2 class="text-center fw-bold mb-4">Реєстрація користувача</h2>
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Повне ім'я</label>
                            <input type="text" class="form-control" placeholder="Аліса Шварц" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Електронна пошта (Email)</label>
                            <input type="email" class="form-control" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Стать</label>
                            <select class="form-select">
                                <option value="female">Жіноча</option>
                                <option value="male">Чоловіча</option>
                                <option value="other">Інша</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Дата народження</label>
                            <input type="date" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Пароль</label>
                            <input type="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mt-3">Створити аккаунт</button>
                    </form>
                    <p class="text-center mt-3 small">Вже маєте профіль? <a href="login.html">Увійти</a></p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer-custom text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">© 2026 Аліса Шварц | КПІ</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script type="module" src="authController.js"></script>
</body>
</html>
