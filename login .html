<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід - CalcMaster Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-dark: #1a1c20; --accent-color: #0d6efd; }
        body { background-color: #e9ecef; }
        .navbar-custom, .footer-custom { background-color: var(--primary-dark) !important; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .auth-card { border-radius: 20px; border: none; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <header class="navbar navbar-expand-lg navbar-dark navbar-custom p-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">CalcMaster<span class="text-primary">.PRO</span></a>
            <div class="navbar-nav ms-auto">
                <a href="registration.html" class="btn btn-outline-light px-4">Реєстрація</a>
            </div>
        </div>
    </header>

    <main class="container my-5 flex-grow-1 d-flex align-items-center">
        <div class="row justify-content-center w-100">
            <div class="col-md-5 col-lg-4">
                <div class="card auth-card shadow-lg p-4">
                    <h2 class="text-center fw-bold mb-4">Вхід до сайту</h2>
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Пароль</label>
                            <input type="password" class="form-control" required>
                        </div>
                        <div class="form-check mb-3">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label" for="remember">Запам'ятати мене</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Увійти</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer-custom text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">© 2026 Аліса Шварц | КПІ</p>
        </div>
    </footer>
	<script type="module" src="authController.js"></script>
</body>
</html>
